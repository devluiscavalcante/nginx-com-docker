<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre | Nginx Docker</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --brand: #0f172a;
      --shadow: 0 20px 50px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      background: var(--card);
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
      max-width: 450px;
      width: 90%;
    }

    .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

    h1 { font-size: 1.8rem; margin-bottom: 1rem; }

    p { 
      color: var(--text-muted); 
      font-size: 1.1rem; 
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    .btn-back:hover {
      color: var(--text-main);
    }

    .btn-back svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }

    .btn-back:hover svg {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>

  <main class="container">
    <span class="icon">ℹ️</span>
    <h1>Sobre este Servidor</h1>
    <p>Esta é uma página de apresentação estática servida por um container <strong>Nginx</strong> em um ambiente isolado com <strong>Docker</strong>.</p>
    
    <a href="/" class="btn-back">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Voltar ao Início
    </a>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos | Nginx Docker</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --brand: #4f46e5
      --brand-light: #eef2ff;
      --shadow: 0 20px 50px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card);
      padding: 3rem 2rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }

    .project-list {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .project-item {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s ease;
    }

    .project-item:hover {
      border-color: var(--brand);
      background: var(--brand-light);
      transform: translateX(4px);
    }

    .project-icon {
      margin-right: 12px;
      font-size: 1.2rem;
    }

    .project-name {
      font-weight: 600;
      color: var(--text-main);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .btn-back:hover { color: var(--text-main); }
    
    .btn-back svg { width: 18px; height: 18px; transition: transform 0.2s ease; }
    .btn-back:hover svg { transform: translateX(-4px); }
  </style>
</head>
<body>

  <main class="container">
    <h1>Meus Projetos</h1>
    
    <ul class="project-list">
      <li class="project-item">
        <span class="project-icon">🐳</span>
        <span class="project-name">Nginx com Docker</span>
      </li>
      </ul>
    
    <a href="/" class="btn-back">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Voltar ao Início
    </a>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nginx Status | Docker</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --brand: #009245; /* Nginx Green */
      --brand-light: #e8f5e9;
      --shadow: 0 20px 50px rgba(0,0,0,0.05);
      --nav-hover: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
      max-width: 450px;
      width: 90%;
    }

    nav {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 1rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    nav a:hover {
      background-color: var(--nav-hover);
      color: var(--text-main);
    }

    nav a.active {
      color: var(--brand);
      background-color: var(--brand-light);
    }

    .icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; }

    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.2rem;
      background: var(--brand-light);
      color: var(--brand);
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <main class="container">
    <nav>
      <ul>
        <li><a href="/" class="active">Home</a></li>
        <li><a href="/projetos.html">Projetos</a></li>
        <li><a href="/sobre.html">Sobre</a></li>
      </ul>
    </nav>

    <span class="icon">🚀</span>
    <h1>Funcionou!</h1>
    <p>Seu servidor <strong>Nginx</strong> está rodando com sucesso via <strong>Docker</strong>.</p>
    <span class="badge">Ambiente Ativo</span>
  </main>
</body>
</html>
